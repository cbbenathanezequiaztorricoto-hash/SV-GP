<!DOCTYPE html>
<html lang="es-BO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - El Recuerdo</title>
    <link rel="stylesheet" href="../estilos/login.css">
        <!-- ✅ SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <main class="login-container">
        <div class="login-box">
            <header class="login-header">
                <h1 class="login-title">Iniciar Sesión</h1>
                <p class="login-subtitle">Ingresa tus credenciales para continuar</p>
            </header>
            
            <form id="formLogin" novalidate>
                <div class="input-group">
                    <label for="username" class="sr-only">Usuario</label>
                    <input type="text" id="username" name="username" placeholder="Usuario" autocomplete="username" required>
                </div>
                
                <div class="input-group password-group">
                    <label for="password" class="sr-only">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Contraseña" autocomplete="current-password" required>
                    <button type="button" id="togglePassword" class="toggle-password" aria-label="Mostrar u ocultar contraseña">
                        <span id="toggleText">Mostrar</span>
                    </button>
                </div>

                <div class="remember-forgot">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe">
                        <span>Recordarme</span>
                    </label>
                </div>

                <button type="submit" id="btnLogin" class="btn-primary">Ingresar</button>
            </form>
            
            <div id="mensajeError" class="message error" role="alert" aria-live="polite"></div>
        </div>
    </main>

    <script src="../js/login.js"></script>
</body>
</html>
